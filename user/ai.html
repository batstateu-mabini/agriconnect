<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Groq Chat</title>
    <style>
      body {
        font-family: Arial;
        padding: 2rem;
      }
      #output {
        white-space: pre-wrap;
        border: 1px solid #ccc;
        padding: 1rem;
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <h2>Groq AI Chat</h2>
    <textarea
      id="userInput"
      rows="4"
      cols="50"
      placeholder="Enter your message..."></textarea
    ><br />
    <button onclick="sendMessage()">Send</button>
    <div id="output"></div>
  </body>
</html>
